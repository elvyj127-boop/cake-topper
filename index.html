      @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500;600&display=swap');
      * { box-sizing: border-box; margin: 0; padding: 0; }

      .vp-root {
        min-height: 100vh;
        font-family: 'Barlow', sans-serif;
        color: #f0f0f0;
        position: relative;
        /* Rich colourful background so glass reads clearly */
        background: linear-gradient(135deg, #fce4ec 0%, #e8eaf6 25%, #e0f2f1 50%, #fff3e0 75%, #f3e5f5 100%);
        background-attachment: fixed;
      }



      /* Abstract geometric shapes behind glass */





      /* Frosted glass on light bg */
      .glass {
        background: rgba(255,255,255,0.25);
        border: 1px solid rgba(255,255,255,0.45);
        border-bottom: 1px solid rgba(255,255,255,0.18);
        border-right: 1px solid rgba(255,255,255,0.18);
        border-radius: 16px;
        backdrop-filter: blur(20px) saturate(1.8);
        -webkit-backdrop-filter: blur(20px) saturate(1.8);
        box-shadow:
          0 8px 32px rgba(0,0,0,0.06),
          0 1px 0 rgba(255,255,255,0.6) inset;
        position: relative;
        z-index: 1;
      }
      .glass-strong {
        background: rgba(255,255,255,0.2);
        border: 1px solid rgba(255,255,255,0.4);
        border-bottom: 1px solid rgba(255,255,255,0.12);
        border-right: 1px solid rgba(255,255,255,0.12);
        border-radius: 16px;
        backdrop-filter: blur(24px) saturate(1.8);
        -webkit-backdrop-filter: blur(24px) saturate(1.8);
        box-shadow:
          0 8px 32px rgba(0,0,0,0.08),
          0 1px 0 rgba(255,255,255,0.5) inset,
          1px 0 0 rgba(255,255,255,0.3) inset;
        position: relative;
        z-index: 1;
      }
      /* Price estimator glass */
      .glass-orange {
        background: rgba(232,96,44,0.08);
        border: 1px solid rgba(232,96,44,0.25);
        border-top: 1px solid rgba(232,96,44,0.4);
        border-left: 1px solid rgba(232,96,44,0.3);
        border-radius: 10px;
        backdrop-filter: blur(20px) saturate(1.5);
        -webkit-backdrop-filter: blur(20px) saturate(1.5);
        box-shadow: 0 4px 20px rgba(232,96,44,0.12), 0 1px 0 rgba(255,170,100,0.2) inset;
      }

      /* Section label */
      .sec-label {
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        font-size: 0.6rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(200,70,15,0.9);
        margin-bottom: 6px;
      }

      /* Input field */
      .vp-input {
        width: 100%;
        background: rgba(255,255,255,0.25);
        border: 1px solid rgba(0,0,0,0.1);
        border-top: 1px solid rgba(255,255,255,0.9);
        border-left: 1px solid rgba(255,255,255,0.7);
        border-radius: 8px;
        color: #111111;
        font-family: 'Barlow', sans-serif;
        font-size: 0.9rem;
        padding: 9px 12px;
        outline: none;
        backdrop-filter: blur(10px);
        transition: all 0.2s;
        box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset;
      }
      .vp-input::placeholder { color: rgba(0,0,0,0.3); }
      .vp-input:focus {
        border-color: rgba(232,96,44,0.6);
        border-top-color: rgba(232,96,44,0.8);
        background: rgba(255,255,255,0.4);
        box-shadow: 0 0 0 3px rgba(232,96,44,0.1), 0 1px 0 rgba(232,96,44,0.1) inset;
      }
      .vp-input option { background: #fff; color: #222; }

      /* Toggle button */
      .vp-tog {
        flex: 1;
        padding: 8px 6px;
        border: 1px solid rgba(0,0,0,0.1);
        border-top: 1px solid rgba(255,255,255,0.9);
        border-radius: 7px;
        background: rgba(255,255,255,0.15);
        color: rgba(0,0,0,0.45);
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
        backdrop-filter: blur(12px);
        box-shadow: 0 1px 0 rgba(255,255,255,0.1) inset;
        transition: all 0.2s;
      }
      .vp-tog.active {
        background: rgba(232,96,44,0.18);
        border-color: rgba(232,96,44,0.45);
        border-top-color: rgba(232,96,44,0.6);
        color: #ff9060;
        box-shadow: 0 0 12px rgba(232,96,44,0.15), 0 1px 0 rgba(255,170,100,0.2) inset;
      }
      .vp-tog:not(.active):hover {
        background: rgba(255,255,255,0.75);
        color: rgba(0,0,0,0.7);
      }

      /* Line card */
      .line-card {
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.3);
        border-top: 1px solid rgba(255,255,255,0.5);
        border-left: 2px solid rgba(232,96,44,0.45);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 0.75rem;
        backdrop-filter: blur(16px) saturate(1.6);
        -webkit-backdrop-filter: blur(16px) saturate(1.6);
        box-shadow: 0 4px 24px rgba(0,0,0,0.06), 0 1px 0 rgba(255,255,255,0.4) inset;
      }

      /* Range input */
      input[type=range] { accent-color: #E8602C; }

      /* Status bar */
      .status-bar {
        display: flex; align-items: center; gap: 8px;
        padding: 7px 12px;
        border-radius: 6px;
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 0.75rem;
      }

      /* Main button */
      .vp-btn-main {
        width: 100%;
        padding: 13px;
        background: rgba(232,96,44,0.18);
        color: rgba(255,150,80,0.95);
        border: 1px solid rgba(232,96,44,0.35);
        border-top: 1px solid rgba(232,96,44,0.55);
        border-radius: 8px;
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 800;
        font-size: 1rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        backdrop-filter: blur(12px);
        box-shadow: 0 4px 20px rgba(232,96,44,0.12), 0 1px 0 rgba(255,170,100,0.15) inset;
        transition: all 0.2s;
      }
      .vp-btn-main:hover:not(:disabled) {
        background: rgba(232,96,44,0.28);
        border-color: rgba(232,96,44,0.6);
        color: #ffaa70;
        box-shadow: 0 6px 28px rgba(232,96,44,0.22), 0 1px 0 rgba(255,170,100,0.2) inset;
      }
      .vp-btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

      /* Add line button */
      .vp-btn-add {
        width: 100%;
        padding: 9px;
        border: 1px dashed rgba(0,0,0,0.15);
        border-radius: 6px;
        background: transparent;
        color: rgba(0,0,0,0.3);
        cursor: pointer;
        font-family: 'Barlow Condensed', sans-serif;
        font-weight: 700;
        font-size: 0.82rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        display: flex; align-items: center; justify-content: center; gap: 6px;
        transition: all 0.2s;
        margin-bottom: 1rem;
      }
      .vp-btn-add:hover {
        border-color: rgba(232,96,44,0.5);
        color: rgba(200,70,15,0.8);
        background: rgba(232,96,44,0.04);
      }

      /* Swatch */
      .swatch {
        width: 22px; height: 22px;
        border-radius: 50%;
        cursor: pointer;
        border: 2px solid transparent;
        transition: transform 0.15s, border-color 0.15s;
        flex-shrink: 0;
      }
      .swatch:hover { transform: scale(1.2); }
      .swatch.sel { border-color: #E8602C; box-shadow: 0 0 0 1px #E8602C; }

      /* Responsive */
      @media(max-width:720px) {
        .vp-layout { grid-template-columns: 1fr !important; }
        .vp-preview { position: static !important; }
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
      .animate-in { animation: fadeIn 0.3s ease forwards; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }

<script>
// Font preview: style each font option with its actual font-family
(function() {
  function styleFontOptions() {
    document.querySelectorAll('select.vp-input').forEach(function(sel) {
      // Find font selects (ones where options contain known font names)
      var opts = sel.querySelectorAll('option');
      opts.forEach(function(opt) {
        var fontName = opt.textContent.trim();
        // Check if this looks like a font name (not a category)
        if (fontName && !fontName.includes('—') && !fontName.includes('Google') && !fontName.includes('Adobe')) {
          // Try to apply the font to the option
          opt.style.fontFamily = '"' + fontName + '", cursive';
          opt.style.fontSize = '15px';
        }
      });
    });
  }
  
  // Run on load and observe for DOM changes (React re-renders)
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', styleFontOptions);
  } else {
    styleFontOptions();
  }
  
  // Re-apply on any DOM mutation (catches React re-renders)
  var observer = new MutationObserver(function(mutations) {
    // Debounce
    clearTimeout(observer._timer);
    observer._timer = setTimeout(styleFontOptions, 200);
  });
  observer.observe(document.body || document.documentElement, { 
    childList: true, subtree: true 
  });
})();
</script>
